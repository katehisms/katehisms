<!DOCTYPE html>
<html lang="lv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sagatavošanās grēksūdzei</title>

  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div id="header"></div>

  <!-- APP -->
  <div id="app" style="padding: 30px">

    <!-- =========================
         1. INTRO
    ========================== -->
    <section id="screen-intro" class="screen">
      <h2 style="padding: 10px">SIRDSAPZIŅAS IZMEKLĒŠANA</h2>
      <h2 id="intro-title"></h2>

      <div id="intro-text" style="margin-top: 15px;"></div>

      <label style="display:block; margin-top:20px;">
        <input type="checkbox" id="firstConfession">
        Šī ir mana pirmā grēksūdze
      </label>

      <div style="margin-top:20px;">

        <label for="saveDuration">
          Saglabāt ierīcē:
        </label>

        <select id="saveDuration">

          <option value="0">Nesaglabāt</option>
          <option value="1">1 stunda</option>
          <option value="2">2 stundas</option>
          <option value="3">3 stundas</option>
          <option value="6">6 stundas</option>
          <option value="12">12 stundas</option>
          <option value="24">24 stundas</option>

        </select>

      </div>

      <button class="flashcards__btn flashcards__btn--primary"
              id="btnStart"
              style="font-size: 17px; font-weight: 600;">
        Turpināt
      </button>

    </section>


    <!-- =========================
         2. LŪGŠANA
    ========================== -->
    <section id="screen-prayer"
             class="screen"
             style="display:none;">

      <h2 style="padding: 10px">SIRDSAPZIŅAS IZMEKLĒŠANA</h2>

      <h2 id="prayer-title" style="margin-bottom: 10px"></h2>

      <div id="prayer-text" style="margin-top: 15px"></div>

      <button class="flashcards__btn flashcards__btn--primary"
              id="btnToQuestions"
              style="font-size: 17px; font-weight: 600;">
        Sākt sirdsapziņas izmeklēšanu
      </button>

    </section>


    <!-- =========================
         3. JAUTĀJUMI
    ========================== -->
    <section id="screen-questions"
             class="screen"
             style="display:none;">

      <h2 style="padding: 10px">SIRDSAPZIŅAS IZMEKLĒŠANA</h2>

      <h2 style="margin-bottom: 10px">
        Vai tas attiecas uz mani?
      </h2>

      <div id="questions-container"></div>

      <div style="margin-top:30px;">
        <button class="flashcards__btn flashcards__btn--primary"
                id="btnAddCustom">
          + Pievienot citu grēku
        </button>
      </div>

      <hr />

      <div class="actions">

        <button id="btnGeneratePDF">
          Sagatavot PDF
        </button>

        <button id="btnClear">
          Dzēst
        </button>

      </div>

    </section>

  </div>


  <!-- =========================
       CLEAR MODAL
  ========================== -->
  <div id="clearModal" class="modal hidden">

    <div class="modal-box">

      <p>Ko tu vēlies darīt?</p>

      <button id="clearCancel">Atcelt</button>
      <button id="clearContent">Dzēst tikai saturu</button>
      <button id="clearAll">Dzēst visu un atgriezties sākumā</button>

    </div>

  </div>


  <!-- =========================
       RESUME MODAL (NEW)
  ========================== -->
  <div id="resumeModal" class="modal hidden">

    <div class="modal-box">

      <p>Vai turpināt iepriekšējo sagatavošanos?</p>

      <button id="resumeContinue">Turpināt</button>
      <button id="resumeRestart">Sākt no jauna</button>

    </div>

  </div>


  <!-- JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="/js/app.js"></script>
  <script src="../js/sirdsapzinas.js"></script>
  <script src="/js/pdf.js"></script>

</body>
</html>
