<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vai tas ir grēks?</title>

  <link rel="stylesheet" href="../style.css" />
</head>

<body>
<div id="header"></div>

<<main class="flashcards" id="greks-game">

  <!-- SETUP -->
  <section id="setup" class="flashcards__screen">
    <h1 class="flashcards__title">Vai tas ir grēks?</h1>

    <p class="flashcards__text">
      Spēlē tu redzēsi dažādas situācijas.<br><br>
      A daļā izvēlies, vai tas ir grēks (Jā/Nē).<br>
      B daļā vari izvēlēties vairākas pareizas rīcības.<br><br>
      👉 B daļā var būt vairāk nekā viena pareiza atbilde!
    </p>

    <button id="startBtn" class="flashcards__btn flashcards__btn--primary">
  Sākt spēli
</button>
  </section>

  <!-- GAME -->
  <section id="game" class="flashcards__screen flashcards__hidden">

    <div class="flashcards__top">
      <div id="counter">1 / 15</div>
      <div id="percent">0%</div>
    </div>

    <h2 id="question" class="flashcards__question"></h2>

    <!-- A -->
    <h3>A: Vai tas ir grēks?</h3>
    <div id="aOptions"></div>

    <!-- B -->
    <h3>B: Pareizā rīcība</h3>
    <div id="bOptions"></div>

  </section>

  <!-- RESULT -->
  <section id="result" class="flashcards__screen flashcards__hidden">

    <h2 class="flashcards__title">Spēle pabeigta!</h2>

    <p id="finalScore" class="flashcards__result"></p>

    <button class="flashcards__btn flashcards__btn--primary" onclick="restartSame()">
      Spēlēt vēlreiz
    </button>

  </section>

</main>

<script src="../js/vai-ir-greks.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
